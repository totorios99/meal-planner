<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mise · Meal Planner Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
  <style>
/* === Meal Planner Design System === */

:root {
  /* Surfaces */
  --bg: #FAF8F3;
  --bg-elev: #FFFFFF;
  --bg-sunken: #F2EFE7;

  /* Ink */
  --ink: #14110D;
  --ink-2: #3E3A33;
  --ink-3: #6B6357;
  --ink-4: #A8A095;

  /* Lines */
  --line: #E8E2D4;
  --line-strong: #D4CCB8;

  /* Accent (olive/forest) */
  --accent: #2F5237;
  --accent-2: #3D6B49;
  --accent-soft: #E6EDE6;
  --accent-ink: #1A3022;

  /* Macros */
  --kcal: #14110D;
  --protein: #3F4FB2;
  --carbs: #C28A2C;
  --fats: #8C4A8A;

  /* States */
  --warn: #C5601C;
  --warn-soft: #FBEEDB;
  --danger: #B0382E;
  --off: #98897A;
  --off-soft: #F0EAE0;

  /* Shape */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  /* Type */
  --sans: "Geist", "Inter", ui-sans-serif, system-ui, sans-serif;
  --serif: "Newsreader", "Cormorant Garamond", Georgia, serif;
  --mono: "Geist Mono", ui-monospace, monospace;

  /* Spacing scale via density */
  --density: 1;
}

[data-theme="dark"] {
  --bg: #14110D;
  --bg-elev: #1C1915;
  --bg-sunken: #0E0B08;
  --ink: #F6F2E8;
  --ink-2: #D6CFC0;
  --ink-3: #9C9486;
  --ink-4: #6B6357;
  --line: #2B2620;
  --line-strong: #3A342C;
  --accent: #7CB48A;
  --accent-2: #94C7A1;
  --accent-soft: #1F2D23;
  --accent-ink: #C8E6CF;
  --protein: #8995D6;
  --carbs: #D9AC60;
  --fats: #C28DBE;
  --off-soft: #2B2520;
}

/* Accent variants */
[data-accent="terracotta"] {
  --accent: #B5563A;
  --accent-2: #C16A4C;
  --accent-soft: #F4E7E0;
  --accent-ink: #6E2F1D;
}
[data-accent="terracotta"][data-theme="dark"] {
  --accent: #E08767;
  --accent-2: #EA9C7F;
  --accent-soft: #2E1E18;
  --accent-ink: #F1C5B2;
}
[data-accent="slate"] {
  --accent: #2A3343;
  --accent-2: #3A4659;
  --accent-soft: #E4E8EF;
  --accent-ink: #141A26;
}
[data-accent="slate"][data-theme="dark"] {
  --accent: #93A4C0;
  --accent-2: #A8B7CF;
  --accent-soft: #1A2030;
  --accent-ink: #D6DFEC;
}
[data-accent="ink"] {
  --accent: #14110D;
  --accent-2: #2E2A22;
  --accent-soft: #ECE8DE;
  --accent-ink: #14110D;
}
[data-accent="ink"][data-theme="dark"] {
  --accent: #F6F2E8;
  --accent-2: #E2DCCE;
  --accent-soft: #2B2620;
  --accent-ink: #14110D;
}

* { box-sizing: border-box; }

html, body, #root {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
}

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; color: inherit; }

/* Type */
.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--mono); }
.num { font-variant-numeric: tabular-nums; }

/* App shell */
.app {
  min-height: 100vh;
  background: var(--bg);
}

/* === Top Nav === */
.nav {
  position: sticky;
  top: 0;
  z-index: 30;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: saturate(140%) blur(12px);
  -webkit-backdrop-filter: saturate(140%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 32px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-decoration: none;
}
.brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  display: grid;
  place-items: center;
  color: var(--bg-elev);
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 500;
  font-style: italic;
}
.nav-links {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.nav-link {
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-3);
  text-decoration: none;
  border: none;
  background: transparent;
  cursor: pointer;
  letter-spacing: -0.005em;
  transition: color .15s, background .15s;
}
.nav-link:hover { color: var(--ink); background: var(--bg-sunken); }
.nav-link.active { color: var(--ink); background: var(--bg-sunken); }
.nav-spacer { flex: 1; }
.nav-actions { display: flex; align-items: center; gap: 6px; }
.icon-btn {
  position: relative;
}
.icon-btn .auto-dot {
  position: absolute;
  bottom: 5px; right: 5px;
  width: 6px; height: 6px;
  border-radius: 999px;
  background: var(--accent);
  border: 1.5px solid var(--bg);
}
.icon-btn {
  width: 34px; height: 34px;
  display: grid; place-items: center;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--ink-3);
  transition: background .15s, color .15s, border-color .15s;
}
.icon-btn:hover { background: var(--bg-sunken); color: var(--ink); }

/* === Buttons === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  border: 1px solid transparent;
  transition: background .15s, color .15s, border-color .15s, transform .04s;
  white-space: nowrap;
}
.btn:active { transform: translateY(0.5px); }
.btn-primary {
  background: var(--accent);
  color: #fff;
}
[data-theme="dark"] .btn-primary { color: var(--bg); }
.btn-primary:hover { background: var(--accent-2); }
.btn-ghost {
  background: transparent;
  color: var(--ink-2);
  border-color: var(--line);
}
.btn-ghost:hover { background: var(--bg-sunken); color: var(--ink); border-color: var(--line-strong); }
.btn-quiet {
  background: transparent;
  color: var(--ink-3);
}
.btn-quiet:hover { background: var(--bg-sunken); color: var(--ink); }
.btn-danger-ghost {
  background: transparent;
  color: var(--danger);
  border-color: color-mix(in oklab, var(--danger) 30%, var(--line));
}
.btn-danger-ghost:hover { background: color-mix(in oklab, var(--danger) 10%, transparent); }
.btn-sm { padding: 6px 10px; font-size: 13px; border-radius: 8px; }
.btn-lg { padding: 12px 18px; font-size: 15px; border-radius: 12px; }

/* === Page container === */
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}
.page-wide {
  max-width: 1480px;
}
.page-header {
  display: flex;
  align-items: flex-end;
  gap: 24px;
  margin-bottom: 28px;
}
.page-header-text { flex: 1; min-width: 0; }
.page-eyebrow {
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  margin-bottom: 10px;
}
.page-title {
  font-family: var(--serif);
  font-size: 44px;
  line-height: 1.05;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin: 0;
  font-weight: 400;
}
.page-title em { font-style: italic; color: var(--ink-2); font-weight: 400; }
.page-sub {
  margin-top: 8px;
  color: var(--ink-3);
  font-size: 15px;
}

/* === Cards === */
.card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
}

/* === Meal card (cookbook) === */
.meal-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: border-color .15s, transform .2s, box-shadow .2s;
  display: flex;
  flex-direction: column;
}
.meal-card:hover {
  border-color: var(--line-strong);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px -16px color-mix(in oklab, var(--ink) 25%, transparent);
}
.meal-card-img {
  aspect-ratio: 4/3;
  background: var(--bg-sunken);
  position: relative;
  overflow: hidden;
}
.meal-card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .4s ease;
}
.meal-card:hover .meal-card-img img { transform: scale(1.03); }
.meal-card-img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 55%, color-mix(in oklab, #000 50%, transparent));
  opacity: 0;
  transition: opacity .15s;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 12px;
  gap: 6px;
}
.meal-card:hover .meal-card-img-overlay { opacity: 1; }
.meal-card-img-overlay .icon-btn {
  background: rgba(255,255,255,.95);
  color: var(--ink);
}
.meal-card-img-overlay .icon-btn:hover { background: #fff; }
.meal-tag {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,255,255,.92);
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .02em;
  padding: 4px 8px;
  border-radius: 999px;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
}
.meal-card-body {
  padding: 16px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
}
.meal-name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: var(--ink);
  margin: 0;
}
.meal-desc {
  font-size: 13.5px;
  color: var(--ink-3);
  line-height: 1.5;
  margin: 0;
}
.macro-row {
  display: flex;
  gap: 4px;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
}
.macro-chip {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: 4px 0;
}
.macro-chip-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-4);
}
.macro-chip-value {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  letter-spacing: -.01em;
}
.macro-chip.kcal .macro-chip-value { color: var(--ink); }
.macro-chip.protein .dot { background: var(--protein); }
.macro-chip.carbs .dot { background: var(--carbs); }
.macro-chip.fats .dot { background: var(--fats); }

.macro-dot {
  width: 7px; height: 7px;
  border-radius: 999px;
  display: inline-block;
}

/* === Search & filter === */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.search {
  position: relative;
  flex: 1;
  min-width: 240px;
  max-width: 420px;
}
.search input {
  width: 100%;
  height: 38px;
  padding: 0 14px 0 38px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--ink);
  font-size: 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-3);
  pointer-events: none;
}
.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.chip {
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--ink-2);
  transition: all .15s;
  cursor: pointer;
}
.chip:hover { border-color: var(--line-strong); color: var(--ink); }
.chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
[data-theme="dark"] .chip.active { color: var(--bg); }

/* === Meal grid === */
.meal-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 1080px) {
  .meal-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 720px) {
  .meal-grid { grid-template-columns: 1fr; }
}

/* === Density === */
[data-density="compact"] .page { padding-top: 24px; }
[data-density="compact"] .page-title { font-size: 36px; }
[data-density="compact"] .meal-card-img { aspect-ratio: 16/10; }
[data-density="compact"] .meal-card-body { padding: 12px 14px 14px; gap: 8px; }
[data-density="compact"] .meal-name { font-size: 18px; }

[data-density="cozy"] .page { padding-top: 44px; }
[data-density="cozy"] .meal-grid { gap: 28px; }
[data-density="cozy"] .page-title { font-size: 52px; }

/* === Home page === */
.home-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
@media (max-width: 920px) {
  .home-grid { grid-template-columns: 1fr; }
}
.today-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.today-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.today-head h2 {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -.015em;
  margin: 0;
}
.today-date {
  color: var(--ink-3);
  font-size: 13px;
  font-weight: 500;
}
.today-meals {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.today-meal {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 10px;
  border-radius: var(--r-md);
  transition: background .15s;
}
.today-meal:hover { background: var(--bg-sunken); }
.today-meal-thumb {
  width: 56px;
  height: 56px;
  border-radius: 10px;
  background: var(--bg-sunken);
  overflow: hidden;
  flex-shrink: 0;
}
.today-meal-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.today-meal-info { min-width: 0; }
.today-meal-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -.005em;
}
.today-meal-meta {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 2px;
  display: flex;
  gap: 8px;
}
.today-meal-meta span { font-variant-numeric: tabular-nums; }
.today-meal-kcal {
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  color: var(--ink-3);
  text-align: right;
  font-weight: 500;
}

/* Macros progress block */
.macros-block {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.macros-block h2 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  margin: 0;
  letter-spacing: -.01em;
}
.macros-ring-wrap {
  display: flex;
  align-items: center;
  gap: 24px;
}
.macros-rows {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.macro-row-item {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 10px;
  align-items: center;
}
.macro-row-label {
  font-size: 13px;
  color: var(--ink-2);
  font-weight: 500;
}
.macro-row-bar {
  height: 6px;
  border-radius: 999px;
  background: var(--bg-sunken);
  overflow: hidden;
}
.macro-row-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width .4s ease;
}
.macro-row-val {
  font-size: 12.5px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

/* Week strip */
.week-strip {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 28px;
  margin-bottom: 32px;
}
.week-strip-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 18px;
}
.week-strip-head h2 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  margin: 0;
  letter-spacing: -.01em;
}
.week-strip-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.week-day {
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 12px 14px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color .15s, background .15s;
  cursor: pointer;
  text-align: left;
}
.week-day:hover {
  border-color: var(--line-strong);
  background: var(--bg-elev);
}
.week-day.today {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.week-day.off { background: var(--off-soft); border-color: var(--line); }
.week-day-name {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-3);
}
.week-day.today .week-day-name { color: var(--accent-ink); }
.week-day-date {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -.01em;
  color: var(--ink);
  line-height: 1;
  margin: 2px 0 8px;
}
.week-day-meals {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.week-day-meal {
  font-size: 12px;
  color: var(--ink-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.week-day-kcal {
  margin-top: auto;
  padding-top: 8px;
  font-size: 11.5px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.week-day-off-label {
  font-size: 11px;
  color: var(--off);
  font-style: italic;
}

/* Quick actions */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
@media (max-width: 720px) { .quick-actions { grid-template-columns: 1fr; } }
.qa-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
  text-align: left;
  transition: all .15s;
}
.qa-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 12px 28px -18px color-mix(in oklab, var(--accent) 50%, transparent);
}
.qa-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.qa-text { min-width: 0; }
.qa-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -.005em;
}
.qa-sub {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 2px;
}

/* Recent meals horizontal */
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 18px;
}
.section-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  margin: 0;
  letter-spacing: -.01em;
}
.section-link {
  font-size: 13px;
  color: var(--ink-3);
  text-decoration: none;
  font-weight: 500;
  background: transparent;
  border: none;
  cursor: pointer;
}
.section-link:hover { color: var(--accent); }

/* === Planner === */
.planner-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.week-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 3px;
}
.week-nav button {
  width: 30px; height: 30px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--ink-3);
  display: grid; place-items: center;
}
.week-nav button:hover { background: var(--bg-sunken); color: var(--ink); }
.week-nav .label {
  padding: 0 10px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.quick-fill {
  background: var(--accent-soft);
  border: 1px solid color-mix(in oklab, var(--accent) 18%, var(--line));
  border-radius: var(--r-md);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 13.5px;
  flex-wrap: wrap;
}
.quick-fill-label {
  color: var(--accent-ink);
  font-weight: 500;
}
.quick-fill select {
  flex: 1;
  min-width: 200px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid color-mix(in oklab, var(--accent) 20%, var(--line));
  background: var(--bg-elev);
  padding: 0 10px;
  font-size: 13px;
}

.planner-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
}
@media (max-width: 1080px) {
  .planner-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 720px) {
  .planner-grid { grid-template-columns: 1fr; }
}
.day-col {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  display: flex;
  flex-direction: column;
  min-height: 480px;
  overflow: hidden;
}
.day-col.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.day-col.off {  background: var(--off-soft); }
.day-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.day-head-text { min-width: 0; }
.day-name {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-3);
  white-space: nowrap;
}
.day-col.today .day-name { color: var(--accent-ink); }
.day-date {
  font-family: var(--serif);
  font-size: 20px;
  letter-spacing: -.01em;
  color: var(--ink);
  line-height: 1.1;
  white-space: nowrap;
}
.off-toggle {
  width: 26px; height: 26px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--ink-3);
  display: grid; place-items: center;
  cursor: pointer;
  transition: all .15s;
}
.off-toggle:hover { color: var(--ink); border-color: var(--line-strong); }
.day-col.off .off-toggle { background: var(--warn-soft); color: var(--warn); border-color: color-mix(in oklab, var(--warn) 30%, var(--line)); }

.day-body {
  flex: 1;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.plan-meal {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  cursor: grab;
}
.plan-meal:hover { border-color: var(--line-strong); }
.plan-meal-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -.005em;
  padding-right: 16px;
  line-height: 1.25;
}
.plan-meal-remove {
  position: absolute;
  top: 4px; right: 4px;
  width: 18px; height: 18px;
  display: grid; place-items: center;
  border: none;
  background: transparent;
  color: var(--ink-4);
  border-radius: 4px;
  opacity: 0;
  transition: opacity .15s, color .15s;
}
.plan-meal:hover .plan-meal-remove { opacity: 1; }
.plan-meal-remove:hover { color: var(--danger); }
.plan-meal-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.plan-meal-kcal {
  font-size: 11.5px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.qty-stepper {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-elev);
  height: 22px;
  overflow: hidden;
}
.qty-stepper button {
  width: 20px; height: 20px;
  border: none;
  background: transparent;
  color: var(--ink-3);
  font-size: 12px;
  display: grid; place-items: center;
}
.qty-stepper button:hover { background: var(--bg-sunken); color: var(--ink); }
.qty-stepper .qty-val {
  min-width: 22px;
  text-align: center;
  font-size: 11.5px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--ink);
  padding: 0 2px;
}

.add-meal-btn {
  width: 100%;
  border: 1px dashed var(--line-strong);
  background: transparent;
  border-radius: 8px;
  padding: 10px;
  color: var(--ink-3);
  font-size: 12.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-weight: 500;
  transition: all .15s;
}
.add-meal-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

.off-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  padding: 20px;
  color: var(--off);
  font-size: 13px;
  font-style: italic;
  text-align: center;
}
.off-placeholder-input {
  width: 100%;
  border: 1px dashed var(--line-strong);
  background: var(--bg-elev);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--ink-2);
  font-size: 12.5px;
  font-style: italic;
  text-align: center;
  outline: none;
}
.off-placeholder-input:focus { border-style: solid; border-color: var(--accent); }

.day-foot {
  border-top: 1px dashed var(--line);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.day-totals {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
}
.day-total {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
}
.day-total-label {
  color: var(--ink-3);
  font-weight: 500;
  letter-spacing: .02em;
}
.day-total-val {
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--ink);
}
.day-total-val.over { color: var(--warn); }
.day-note {
  padding: 6px 0 2px;
  font-size: 12px;
  color: var(--ink-3);
  font-style: italic;
  border-top: 1px dashed var(--line);
  cursor: text;
}
.day-note-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  padding: 0;
  font-size: 12px;
  font-style: italic;
  color: var(--ink-2);
  resize: none;
}

/* === Print page === */
.print-shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}
.print-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 20px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  margin-bottom: 24px;
}
.print-toolbar-info {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.print-toolbar-info .title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -.01em;
  white-space: nowrap;
}
.print-toolbar-info .dates {
  color: var(--ink-3);
  font-size: 14px;
  white-space: nowrap;
}
.print-paper {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 64px 56px;
  box-shadow: 0 24px 64px -32px color-mix(in oklab, var(--ink) 25%, transparent);
}
[data-theme="dark"] .print-paper {
  background: #FAF8F3;
  color: #14110D;
}
.print-paper-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 2px solid #14110D;
}
.print-paper-head h1 {
  font-family: var(--serif);
  font-size: 42px;
  margin: 0;
  font-weight: 400;
  letter-spacing: -.02em;
  color: #14110D;
}
.print-paper-head h1 em { font-style: italic; color: #3E3A33; }
.print-paper-head .meta {
  text-align: right;
  font-size: 13px;
  color: #6B6357;
  line-height: 1.5;
  font-variant-numeric: tabular-nums;
}
.print-paper-head .meta b {
  display: block;
  color: #14110D;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.print-table {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-top: 1px solid #14110D;
  border-left: 1px solid #14110D;
  color: #14110D;
}
.print-day {
  border-right: 1px solid #14110D;
  border-bottom: 1px solid #14110D;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  min-height: 360px;
}
.print-day-head {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #14110D;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 6px;
}
.print-day-head .date {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 400;
  font-style: italic;
  color: #6B6357;
  letter-spacing: 0;
  text-transform: none;
}
.print-day-head .off {
  font-family: var(--serif);
  font-size: 12px;
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
  color: #98897A;
}
.print-meal {
  font-size: 13px;
  line-height: 1.45;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px dotted #D4CCB8;
}
.print-meal:last-of-type { border-bottom: none; }
.print-meal-name { font-weight: 500; }
.print-meal-macros {
  font-size: 11.5px;
  color: #6B6357;
  font-variant-numeric: tabular-nums;
  margin-top: 1px;
  letter-spacing: .01em;
}
.print-day-totals {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid #14110D;
  font-size: 11px;
}
.print-day-totals .kcal {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: #14110D;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 4px;
}
.print-day-totals .kcal small {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #6B6357;
}
.print-day-totals .pcf {
  color: #3E3A33;
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  letter-spacing: .02em;
}
.print-day-off-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-style: italic;
  color: #98897A;
  font-size: 15px;
  text-align: center;
}
.print-day-note {
  margin-top: 10px;
  font-size: 11px;
  font-style: italic;
  color: #6B6357;
  padding: 8px 10px;
  background: #FAF8F3;
  border-left: 2px solid #C5601C;
}

.print-foot {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid #ECE8DE;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  color: #6B6357;
  font-size: 11.5px;
}
.print-foot em { font-family: var(--serif); font-style: italic; }

@media print {
  .nav, .print-toolbar { display: none; }
  body, html, #root { background: #fff; }
  .print-shell { padding: 0; }
  .print-paper { border: none; box-shadow: none; padding: 24px; }
}

/* === Empty state === */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-3);
}
.empty-title {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 6px;
}

/* === Modal/sheet === */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: color-mix(in oklab, var(--ink) 40%, transparent);
  backdrop-filter: blur(2px);
  z-index: 50;
  display: grid;
  place-items: center;
  padding: 20px;
}
.sheet {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  width: 100%;
  max-width: 480px;
  overflow: hidden;
}
.sheet-head {
  padding: 20px 24px 12px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.sheet-title {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -.01em;
  margin: 0;
}
.sheet-body {
  padding: 4px 24px 20px;
  max-height: 60vh;
  overflow: auto;
}
.sheet-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  background: var(--bg);
}

.sheet-meal-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .15s;
}
.sheet-meal-row:hover { background: var(--bg-sunken); }
.sheet-meal-thumb {
  width: 44px; height: 44px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-sunken);
}
.sheet-meal-thumb img { width: 100%; height: 100%; object-fit: cover; }
.sheet-meal-info { min-width: 0; }
.sheet-meal-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.sheet-meal-meta { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }

/* Input field */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}
.field label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.field input, .field textarea {
  border: 1px solid var(--line);
  background: var(--bg);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 14px;
  color: var(--ink);
  outline: none;
}
.field input:focus, .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
}

/* Small visual helpers */
.divider-dot {
  width: 3px; height: 3px;
  border-radius: 999px;
  background: var(--ink-4);
  display: inline-block;
  vertical-align: middle;
  margin: 0 8px;
}

/* Photo placeholder */
.photo-ph {
  width: 100%; height: 100%;
  display: grid; place-items: center;
  background: linear-gradient(135deg, color-mix(in oklab, var(--accent) 12%, var(--bg-sunken)), var(--bg-sunken));
  color: var(--ink-4);
  font-family: var(--serif);
  font-size: 36px;
  font-style: italic;
}

/* ============================================================
   MOBILE — bottom tab bar + mobile-first tuning
   ============================================================ */

/* Bottom tab bar — hidden on desktop, shown on mobile */
.tabbar { display: none; }

@media (max-width: 768px) {
  /* Top nav: keep brand + theme toggle, drop the inline links (tab bar takes over) */
  .nav-inner { padding: 11px 16px; gap: 12px; }
  .nav-links { display: none; }

  /* Bottom tab bar */
  .tabbar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 40;
    background: color-mix(in oklab, var(--bg) 92%, transparent);
    backdrop-filter: saturate(140%) blur(16px);
    -webkit-backdrop-filter: saturate(140%) blur(16px);
    border-top: 1px solid var(--line);
    padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    min-height: 52px;
    border: none;
    background: transparent;
    color: var(--ink-4);
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .01em;
    transition: color .15s, background .15s;
  }
  .tab span { line-height: 1; }
  .tab.active { color: var(--accent); }
  .tab.active svg { stroke-width: 2; }
  .tab:active { background: var(--bg-sunken); }

  /* Give content room above the tab bar */
  .app { padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px)); }

  /* Page paddings tighten */
  .page { padding: 20px 16px 40px; }
  .print-shell { padding: 20px 16px 40px; }
  .page-header { flex-direction: column; align-items: stretch; gap: 16px; margin-bottom: 22px; }
  .page-title { font-size: 32px; }
  [data-density="cozy"] .page-title { font-size: 36px; }
  [data-density="compact"] .page-title { font-size: 28px; }
  .page-header > div[style] { width: 100%; }
  .page-header .btn { flex: 1; justify-content: center; }

  /* Home */
  .home-grid { gap: 16px; margin-bottom: 20px; }
  .today-card, .macros-block { padding: 20px; border-radius: 16px; }
  .week-strip { padding: 18px 16px; border-radius: 16px; margin-bottom: 20px; }
  .week-strip-head { flex-direction: column; align-items: flex-start; gap: 8px; }
  /* Week strip becomes a horizontal scroll-snap rail on mobile */
  .week-strip-days {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 10px;
    margin: 0 -16px;
    padding: 0 16px 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .week-strip-days::-webkit-scrollbar { display: none; }
  .week-day {
    scroll-snap-align: start;
    min-width: 132px;
    flex: 0 0 auto;
  }
  .quick-actions { grid-template-columns: 1fr; gap: 10px; margin-bottom: 24px; }
  .qa-card { padding: 16px 18px; }

  /* Cookbook */
  .meal-grid { grid-template-columns: 1fr; gap: 14px; }
  .toolbar { gap: 10px; }
  .search { max-width: none; }
  .chips { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; }
  /* Persistent edit/delete on mobile (no hover) */
  .meal-card-img-overlay { opacity: 1; background: none; }
  .meal-card-img-overlay .icon-btn { background: rgba(255,255,255,.92); box-shadow: 0 2px 8px rgba(0,0,0,.15); }

  /* Planner — single column, full-height-friendly day cards */
  .planner-grid { grid-template-columns: 1fr; gap: 12px; }
  .day-col { min-height: 0; }
  .planner-toolbar, .page-header + .quick-fill { width: 100%; }
  .quick-fill { flex-direction: column; align-items: stretch; }
  .quick-fill select { min-width: 0; width: 100%; }
  .planner-grid + * { } /* spacer hook */

  /* Print preview scrolls horizontally so the 7-col grid stays legible */
  .print-toolbar { flex-direction: column; align-items: stretch; gap: 12px; }
  .print-toolbar .btn { flex: 1; justify-content: center; }
  .print-paper { padding: 24px 20px; border-radius: 12px; overflow-x: auto; }
  .print-table { min-width: 720px; }
  .print-paper-head { flex-direction: column; gap: 12px; align-items: flex-start; }
  .print-paper-head h1 { font-size: 30px; }
  .print-paper-head .meta { text-align: left; }

  /* Sheets dock to bottom on mobile */
  .sheet-backdrop { align-items: flex-end; padding: 0; }
  .sheet {
    max-width: none;
    border-radius: 18px 18px 0 0;
    max-height: 88vh;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .sheet-body { max-height: 70vh; }

  /* Tweaks panel stays usable */

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

/* ============ Macro Ring (SVG donut) ============ */
const MacroRing = ({ totals, targets, size = 96, thickness = 10 }) => {
  const r = (size - thickness) / 2;
  const c = 2 * Math.PI * r;
  const order = ["protein", "carbs", "fats"];
  const colors = { protein: "var(--protein)", carbs: "var(--carbs)", fats: "var(--fats)" };
  // total kcal pct used as the overall ring; segments scaled to per-macro pct
  let offset = 0;
  const total = order.reduce((s, k) => s + Math.min(1, totals[k] / targets[k]), 0);
  // For visual purposes show each macro as an arc proportional to its pct (clamped 0..1)
  const kcalPct = Math.min(1, totals.kcal / targets.kcal);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--bg-sunken)" strokeWidth={thickness} fill="none" />
      {order.map((k, i) => {
        const pct = Math.min(1, totals[k] / targets[k]);
        const len = c * pct / 3;
        const startOffset = -c * (i / 3);
        const dash = `${len} ${c - len}`;
        return (
          <circle
            key={k}
            cx={size/2} cy={size/2} r={r}
            stroke={colors[k]} strokeWidth={thickness} fill="none"
            strokeDasharray={dash}
            strokeDashoffset={startOffset}
            transform={`rotate(-90 ${size/2} ${size/2})`}
            strokeLinecap="butt"
            style={{ transition: "stroke-dasharray .4s ease" }}
          />
        );
      })}
      <text x="50%" y="48%" textAnchor="middle" dominantBaseline="middle"
            fontFamily="var(--serif)" fontSize={size*0.26} fill="var(--ink)" fontWeight="500">
        {Math.round(kcalPct * 100)}<tspan fontSize={size*0.13} fill="var(--ink-3)">%</tspan>
      </text>
      <text x="50%" y="66%" textAnchor="middle" dominantBaseline="middle"
            fontFamily="var(--sans)" fontSize={size*0.10} fill="var(--ink-3)"
            style={{ letterSpacing: "0.12em", textTransform: "uppercase" }}>
        kcal
      </text>
    </svg>
  );
};

/* ============ Macro rows (compact) ============ */
const MacroRows = ({ totals, targets, compact = false }) => {
  const items = [
    { key: "protein", label: "Protein", unit: "g", color: "var(--protein)" },
    { key: "carbs", label: "Carbs", unit: "g", color: "var(--carbs)" },
    { key: "fats", label: "Fats", unit: "g", color: "var(--fats)" },
  ];
  return (
    <div className="macros-rows">
      {items.map(it => {
        const v = totals[it.key];
        const t = targets[it.key];
        const pct = Math.min(100, Math.round((v / t) * 100));
        const over = v > t;
        return (
          <div className="macro-row-item" key={it.key}>
            <div className="macro-row-label">
              <span className="macro-dot" style={{ background: it.color, marginRight: 6 }} />
              {it.label}
            </div>
            <div className="macro-row-bar">
              <div className="macro-row-bar-fill" style={{ width: `${Math.min(100, pct)}%`, background: over ? "var(--warn)" : it.color }} />
            </div>
            <div className="macro-row-val">
              {Math.round(v)}<span style={{ color: "var(--ink-4)" }}>/{t}{it.unit}</span>
            </div>
          </div>
        );
      })}
    </div>
  );

const Nav = ({ route, setRoute, resolvedTheme, themePref, setTheme }) => {

            <Icon name={l.icon} size={20} />

          </button>
        ))}
      </nav>
    </>

};

// Planner page — weekly meal plan grid.

const { useState } = React;

const PlannerPage = ({ plan, setPlan, openMealPicker }) => {
  const today = "Tue";

  const updateDay = (dayKey, patch) => {
    setPlan(p => ({ ...p, [dayKey]: { ...p[dayKey], ...patch } }));
  };

  const updateItem = (dayKey, idx, patch) => {
    setPlan(p => ({
      ...p,
      [dayKey]: {
        ...p[dayKey],
        items: p[dayKey].items.map((it, i) => i === idx ? { ...it, ...patch } : it),
      },
    }));
  };

  const removeItem = (dayKey, idx) => {
    setPlan(p => ({
      ...p,
      [dayKey]: { ...p[dayKey], items: p[dayKey].items.filter((_, i) => i !== idx) },
    }));
  };

  const toggleOff = (dayKey) => {
    setPlan(p => {
      const d = p[dayKey];
      const next = { ...d, off: !d.off };
      if (next.off && !d.note) next.note = "Off day";
      return { ...p, [dayKey]: next };
    });
  };

  // Week aggregate
  const weekTotals = window.DAY_KEYS.reduce((acc, k) => {
    const t = window.dayTotals(plan[k]);
    acc.kcal += t.kcal;
    acc.protein += t.protein;
    acc.carbs += t.carbs;
    acc.fats += t.fats;
    return acc;
  }, { kcal: 0, protein: 0, carbs: 0, fats: 0 });
  const daysOn = window.DAY_KEYS.filter(k => !plan[k].off).length;

  return (
    <div className="page page-wide">
      <div className="page-header">

          <div className="week-nav">
            <button title="Previous week"><Icon name="chev-left" size={16} /></button>
            <span className="label num">May 18 – 24</span>
            <button title="Next week"><Icon name="chev-right" size={16} /></button>
          </div>
          <button className="btn btn-ghost">
            <Icon name="settings" size={14} /> Targets
          </button>
        </div>
      </div>

      <div className="quick-fill">
        <span className="quick-fill-label">
          <Icon name="sparkle" size={14} style={{ marginRight: 6, verticalAlign: "-2px" }} />
          Quick-fill from past week
        </span>
        <select defaultValue="">
          <option value="" disabled>— pick a week to copy from —</option>
          <option>May 11 – May 17 (3 days)</option>
          <option>May 4 – May 10 (5 days)</option>
          <option>Apr 27 – May 3 (7 days)</option>
        </select>
        <button className="btn btn-primary btn-sm">Apply</button>
      </div>

      <div className="planner-grid">
        {window.DAY_KEYS.map(k => {
          const d = plan[k];
          const totals = window.dayTotals(d);
          const isToday = k === today;
          return (
            <div key={k} className={`day-col ${isToday ? "today" : ""} ${d.off ? "off" : ""}`}>
              <div className="day-head">
                <div className="day-head-text">
                  <div className="day-name">{window.DAY_FULL[k]}</div>
                  <div className="day-date num">May {d.date}</div>
                </div>
                <button className="off-toggle" title={d.off ? "Mark as on" : "Mark as off"}
                        onClick={() => toggleOff(k)}>
                  <Icon name={d.off ? "trip" : "plus"} size={14} />
                </button>
              </div>

              {d.off ? (
                <div className="day-body" style={{ flex: 1 }}>
                  <div className="off-placeholder">
                    <Icon name="trip" size={28} />
                    <input className="off-placeholder-input"
                           value={d.note}
                           onChange={e => updateDay(k, { note: e.target.value })}
                           placeholder="Why off? (e.g. Trip, eating out)" />
                  </div>
                </div>
              ) : (
                <>
                  <div className="day-body">
                    {d.items.map((it, idx) => {
                      const m = window.getMeal(it.mealId);
                      if (!m) return null;
                      return (
                        <div className="plan-meal" key={idx}>
                          <button className="plan-meal-remove" title="Remove" onClick={() => removeItem(k, idx)}>
                            <Icon name="x" size={11} />
                          </button>
                          <div className="plan-meal-name">{m.name}</div>
                          <div className="plan-meal-row">
                            <span className="plan-meal-kcal num">{m.kcal * it.qty} kcal</span>
                            <span className="qty-stepper">
                              <button onClick={() => updateItem(k, idx, { qty: Math.max(1, it.qty - 1) })}>
                                <Icon name="minus" size={10} />
                              </button>
                              <span className="qty-val">{it.qty}</span>
                              <button onClick={() => updateItem(k, idx, { qty: it.qty + 1 })}>
                                <Icon name="plus" size={10} />
                              </button>
                            </span>
                          </div>
                        </div>
                      );
                    })}
                    <button className="add-meal-btn" onClick={() => openMealPicker(k)}>
                      <Icon name="plus" size={12} /> Add meal
                    </button>
                  </div>

                  <div className="day-foot">
                    <div className="day-totals">
                      <div className="day-total">
                        <span className="macro-dot" style={{ background: "var(--ink)" }} />
                        <span className="day-total-label">kcal</span>
                        <span className={`day-total-val num ${totals.kcal > window.TARGETS.kcal ? "over" : ""}`}>
                          {Math.round(totals.kcal)}<span style={{ color: "var(--ink-4)" }}>/{window.TARGETS.kcal}</span>
                        </span>
                      </div>
                      <div className="day-total">
                        <span className="macro-dot" style={{ background: "var(--protein)" }} />
                        <span className="day-total-label">P</span>
                        <span className={`day-total-val num ${totals.protein > window.TARGETS.protein ? "over" : ""}`}>
                          {Math.round(totals.protein)}<span style={{ color: "var(--ink-4)" }}>g</span>
                        </span>
                      </div>
                      <div className="day-total">
                        <span className="macro-dot" style={{ background: "var(--carbs)" }} />
                        <span className="day-total-label">C</span>
                        <span className={`day-total-val num ${totals.carbs > window.TARGETS.carbs ? "over" : ""}`}>
                          {Math.round(totals.carbs)}<span style={{ color: "var(--ink-4)" }}>g</span>
                        </span>
                      </div>
                      <div className="day-total">
                        <span className="macro-dot" style={{ background: "var(--fats)" }} />
                        <span className="day-total-label">F</span>
                        <span className={`day-total-val num ${totals.fats > window.TARGETS.fats ? "over" : ""}`}>
                          {Math.round(totals.fats)}<span style={{ color: "var(--ink-4)" }}>g</span>
                        </span>
                      </div>
                    </div>
                    <input className="day-note-input"
                           value={d.note}
                           onChange={e => updateDay(k, { note: e.target.value })}
                           placeholder="+ Add note" />
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

window.PlannerPage = PlannerPage;

  </script>

  const [plan, setPlan] = useState(window.INITIAL_PLAN);
  const [picker, setPicker] = useState({ open: false, dayKey: null });
  const [newMeal, setNewMeal] = useState(false);

  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  // Track the OS color scheme so "system" can follow it live.
  const [systemDark, setSystemDark] = useState(() =>
    window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
  );
  useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const onChange = (e) => setSystemDark(e.matches);
    mq.addEventListener ? mq.addEventListener("change", onChange) : mq.addListener(onChange);
    return () => {
      mq.removeEventListener ? mq.removeEventListener("change", onChange) : mq.removeListener(onChange);
    };
  }, []);

  const themePref = tweaks.theme || "system";
  const resolvedTheme = themePref === "system" ? (systemDark ? "dark" : "light") : themePref;

  // Apply tweaks to root
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", resolvedTheme);
    document.documentElement.setAttribute("data-accent", ACCENT_MAP[tweaks.accent] || "olive");
    document.documentElement.setAttribute("data-density", tweaks.density || "standard");
  }, [resolvedTheme, tweaks.accent, tweaks.density]);

  // Nav toggle sets an explicit override opposite to what's currently showing.
  const setTheme = () => setTweak("theme", resolvedTheme === "dark" ? "light" : "dark");

  const openMealPicker = (dayKey) => setPicker({ open: true, dayKey });
  const closePicker = () => setPicker({ open: false, dayKey: null });
  const pickMeal = (mealId) => {
    setPlan(p => ({
      ...p,
      [picker.dayKey]: {
        ...p[picker.dayKey],
        items: [...p[picker.dayKey].items, { mealId, qty: 1 }],
      },
    }));
    closePicker();
  };

  return (
    <div className="app">
      <Nav route={route} setRoute={setRoute} resolvedTheme={resolvedTheme} themePref={themePref} setTheme={setTheme} />
      {route === "home" && <window.HomePage plan={plan} setRoute={setRoute} />}
      {route === "cookbook" && <window.CookbookPage onAdd={() => setNewMeal(true)} />}
      {route === "planner" && <window.PlannerPage plan={plan} setPlan={setPlan} openMealPicker={openMealPicker} />}
      {route === "print" && <window.PrintPage plan={plan} setRoute={setRoute} />}

      <MealPickerSheet open={picker.open} onClose={closePicker} onPick={pickMeal} />
      <NewMealSheet open={newMeal} onClose={() => setNewMeal(false)} />

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Theme">
          <window.TweakRadio
            label="Mode"
            value={themePref}
            options={[
              { value: "system", label: "Auto" },
              { value: "light", label: "Light" },
              { value: "dark", label: "Dark" },
            ]}
            onChange={v => setTweak("theme", v)}
          />
        </window.TweakSection>
        <window.TweakSection label="Accent">
          <window.TweakColor
            label="Color"
            value={tweaks.accent}
            options={["#2F5237", "#B5563A", "#2A3343", "#14110D"]}
            onChange={v => setTweak("accent", v)}
          />
        </window.TweakSection>
        <window.TweakSection label="Density">
          <window.TweakRadio
            label="Spacing"
            value={tweaks.density}
            options={[
              { value: "compact", label: "Compact" },
              { value: "standard", label: "Standard" },
              { value: "cozy", label: "Cozy" },
            ]}
            onChange={v => setTweak("density", v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
