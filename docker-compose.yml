services:
  mise:
    build: .
    image: mise
    container_name: mise
    ports:
      - "3000:3000"
    volumes:
      - /DATA/AppData/mise:/app/data
    environment:
      - DATABASE_URL=file:/app/data/meal-planner.db
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/meals"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: mise
  title:
    en_us: Mise
  description:
    en_us: Personal meal planner with weekly planning, macro tracking, and print-ready meal references.
  tagline:
    en_us: Meal planning, simplified.
  developer: Antonio Rios
  author: Antonio Rios
  category: Utilities
  port_map: "3000"
  icon: "data:image/svg+xml;base64,"
