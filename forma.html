<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Forma · Nutrition & Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════════════════════
   FORMA DESIGN SYSTEM
   Fitness & Nutrition App — CasaOS companion to Mise
   See design_handoff_forma/tokens.css for full token docs
═══════════════════════════════════════════════════════ */

:root {
  --bg: #F8F5F0; --bg-elev: #FFFFFF; --bg-sunken: #EEE9E1; --bg-overlay: rgba(24,19,14,0.48);
  --ink: #18130E; --ink-2: #4A3F35; --ink-3: #8C7F73; --ink-4: #C4B9AD;
  --line: #E5DFD4; --line-strong: #D0C8B8;
  --accent: #1E3A5F; --accent-2: #2A527F; --accent-soft: #EAF0F8; --accent-ink: #FFFFFF;
  --energy: #D4520C; --energy-2: #B84308; --energy-soft: #FEF0E8; --energy-ink: #FFFFFF;
  --protein: #3F4FB2; --carbs: #C28A2C; --fats: #8C4A8A;
  --protein-soft: #ECEFFE; --carbs-soft: #FDF5E4; --fats-soft: #F7EEFF;
  --success: #276B3F; --success-soft: #E8F5EE;
  --warn: #C5601C; --danger: #B0382E; --danger-soft: #FEECEB;
  --font-sans: 'Geist', -apple-system, sans-serif;
  --font-serif: 'Newsreader', Georgia, serif;
  --r-xs:4px; --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-2xl:28px; --r-full:9999px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px; --sp-12:48px;
  --shadow-sm: 0 1px 3px rgba(24,19,14,0.07),0 1px 2px rgba(24,19,14,0.04);
  --shadow-md: 0 4px 12px rgba(24,19,14,0.09),0 2px 4px rgba(24,19,14,0.04);
  --shadow-focus: 0 0 0 3px rgba(30,58,95,0.25);
  --nav-h:56px; --tab-h:60px; --content-max:480px;
}
[data-theme="dark"] {
  --bg:#0E1A24; --bg-elev:#162231; --bg-sunken:#091219;
  --ink:#F0EDE8; --ink-2:#B0C4D4; --ink-3:#5C7A90; --ink-4:#2E4A5E;
  --line:#1E3040; --line-strong:#2A4258;
  --accent:#6EA8D4; --accent-2:#89BADF; --accent-soft:#0E2030; --accent-ink:#0E1A24;
  --energy:#FF7535; --energy-2:#FF8F5A; --energy-soft:#2A1508; --energy-ink:#0E1A24;
  --protein:#7B8EE8; --carbs:#E8B84C; --fats:#C48EC4;
  --protein-soft:#161A3A; --carbs-soft:#2A1E08; --fats-soft:#1E0E20;
  --success:#4EAD72; --success-soft:#0A200F;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.25); --shadow-md:0 4px 12px rgba(0,0,0,0.30);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100dvh;overscroll-behavior:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit}
::-webkit-scrollbar{width:0;height:0}

/* Layout */
.app-shell{max-width:var(--content-max);margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
.page-content{flex:1;padding-top:var(--nav-h);padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));overflow-y:auto}
.page-inner{padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-4)}

/* Top nav */
.top-nav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--content-max);height:var(--nav-h);background:var(--bg-elev);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp-4);z-index:100}
.nav-brand{display:flex;align-items:center;gap:var(--sp-2);font-weight:700;font-size:18px;letter-spacing:-0.02em;color:var(--accent)}
.brand-icon{width:28px;height:28px;background:var(--accent);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--accent-ink);font-size:14px;font-weight:700}
.nav-actions{display:flex;align-items:center;gap:var(--sp-2)}
.icon-btn{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:background .15s,color .15s}
.icon-btn:hover{background:var(--bg-sunken);color:var(--ink)}
.icon-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--content-max);height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--bg-elev);border-top:1px solid var(--line);display:flex;align-items:flex-start;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:var(--tab-h);color:var(--ink-3);font-size:11px;font-weight:500;transition:color .15s;-webkit-tap-highlight-color:transparent;position:relative}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8}
.tab-item.active svg{stroke-width:2.2}
.tab-dot{position:absolute;top:8px;width:4px;height:4px;border-radius:var(--r-full);background:var(--accent)}

/* Card */
.card{background:var(--bg-elev);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);border:1px solid var(--line);overflow:hidden}
.card-body{padding:var(--sp-4)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--sp-2);border-radius:var(--r-md);font-size:15px;font-weight:600;padding:10px 18px;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:var(--accent-ink)}.btn-primary:hover{background:var(--accent-2)}
.btn-energy{background:var(--energy);color:var(--energy-ink)}.btn-energy:hover{background:var(--energy-2)}
.btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line-strong)}.btn-ghost:hover{background:var(--bg-sunken)}
.btn-full{width:100%}.btn-sm{font-size:13px;padding:7px 12px}.btn-lg{font-size:16px;padding:14px 24px;border-radius:var(--r-lg)}
.btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--r-full);font-size:12px;font-weight:500}
.chip-protein{background:var(--protein-soft);color:var(--protein)}
.chip-carbs{background:var(--carbs-soft);color:var(--carbs)}
.chip-fats{background:var(--fats-soft);color:var(--fats)}
.chip-accent{background:var(--accent-soft);color:var(--accent)}
.chip-energy{background:var(--energy-soft);color:var(--energy)}
.chip-success{background:var(--success-soft);color:var(--success)}

/* Section header */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-3)}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3)}

/* Quick tiles */
.quick-tiles{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3)}
.quick-tile{background:var(--bg-elev);border-radius:var(--r-xl);border:1px solid var(--line);box-shadow:var(--shadow-sm);padding:var(--sp-5) var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-2);cursor:pointer;transition:box-shadow .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.quick-tile:active{transform:scale(.97)}
.quick-tile.accent{background:var(--accent);border-color:var(--accent)}
.quick-tile.accent .tile-icon{background:rgba(255,255,255,.15)}
.quick-tile.accent .tile-label{color:rgba(255,255,255,.65)}
.quick-tile.accent .tile-title{color:#fff}
.quick-tile.energy{background:var(--energy);border-color:var(--energy)}
.quick-tile.energy .tile-icon{background:rgba(255,255,255,.15)}
.quick-tile.energy .tile-label{color:rgba(255,255,255,.65)}
.quick-tile.energy .tile-title{color:#fff}
.tile-icon{width:40px;height:40px;background:var(--bg-sunken);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:20px}
.tile-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3)}
.tile-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.2}

/* Ring */
.ring-wrapper{position:relative;flex-shrink:0}
.ring-center-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Stat bar */
.stat-bar{height:4px;border-radius:var(--r-full);background:var(--line);overflow:hidden}

/* Typography */
.t-display{font-family:var(--font-serif);font-size:32px;font-weight:400;line-height:1.15;letter-spacing:-0.02em}
.t-title{font-size:22px;font-weight:600;line-height:1.2;letter-spacing:-0.01em}
.t-caption{font-size:12px;font-weight:400;line-height:1.4;color:var(--ink-3)}

/* Plan items */
.plan-item{background:var(--bg-elev);border-radius:var(--r-xl);border:1px solid var(--line);box-shadow:var(--shadow-sm);overflow:hidden}
.plan-item-head{padding:var(--sp-3) var(--sp-4);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.plan-expand{transition:transform .2s;color:var(--ink-3)}
.plan-expand.open{transform:rotate(180deg)}
.day-meals{padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line)}
.day-theme{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:var(--sp-2)}
.meal-row{display:flex;align-items:baseline;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);gap:var(--sp-3)}
.meal-row:last-child{border-bottom:none}
.meal-type{font-size:11px;color:var(--ink-3);text-transform:capitalize;min-width:60px}
.meal-name{font-size:14px;font-weight:500;flex:1}
.meal-kcal{font-size:13px;font-weight:600;color:var(--ink-2)}
.day-total{display:flex;justify-content:flex-end;gap:var(--sp-3);padding-top:var(--sp-2);margin-top:var(--sp-1);border-top:1px dashed var(--line);font-size:12px;font-weight:600}

/* Chat */
.chat-container{display:flex;flex-direction:column;height:calc(100dvh - var(--nav-h) - 44px - var(--tab-h) - env(safe-area-inset-bottom))}
.chat-messages{flex:1;overflow-y:auto;padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3)}
.chat-input-area{padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);background:var(--bg-elev);display:flex;gap:var(--sp-2);align-items:flex-end}
.chat-input{flex:1;background:var(--bg-sunken);border:1px solid var(--line);border-radius:var(--r-xl);padding:10px var(--sp-4);font-size:15px;color:var(--ink);outline:none;resize:none;min-height:44px;max-height:120px}
.chat-input:focus{border-color:var(--accent);box-shadow:var(--shadow-focus)}
.chat-send{width:40px;height:40px;background:var(--accent);border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;color:var(--accent-ink);flex-shrink:0;transition:background .15s}
.chat-send:hover{background:var(--accent-2)}
.chat-send svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.msg-bubble{max-width:85%;padding:10px var(--sp-4);border-radius:var(--r-xl);font-size:15px;line-height:1.5}
.msg-ai{align-self:flex-start;background:var(--bg-elev);border:1px solid var(--line);border-radius:4px var(--r-xl) var(--r-xl) var(--r-xl)}
.msg-user{align-self:flex-end;background:var(--accent);color:var(--accent-ink);border-radius:var(--r-xl) 4px var(--r-xl) var(--r-xl)}
.msg-section-tag{align-self:center;background:var(--bg-sunken);border-radius:var(--r-full);padding:4px 12px;font-size:12px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.coach-progress{display:flex;gap:3px;padding:var(--sp-3) var(--sp-4);background:var(--bg-elev);border-bottom:1px solid var(--line);height:44px;align-items:center}
.progress-dot{flex:1;height:3px;border-radius:var(--r-full);background:var(--line);transition:background .3s}
.progress-dot.done{background:var(--accent)}.progress-dot.active{background:var(--energy)}
.msg-row{display:flex;gap:var(--sp-2);align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.ai-avatar{width:32px;height:32px;border-radius:var(--r-full);background:var(--accent-soft);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.user-avatar{width:32px;height:32px;border-radius:var(--r-full);background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.typing-dot{width:6px;height:6px;border-radius:var(--r-full);background:var(--ink-3);animation:blink 1.4s infinite both}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:4px 0}

/* Plan result card */
.plan-result-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden;width:100%;margin-top:var(--sp-2)}
.plan-result-header{background:var(--accent);color:#fff;padding:var(--sp-4)}
.plan-result-targets{display:flex;gap:var(--sp-4);padding:var(--sp-4);border-bottom:1px solid var(--line)}
.target-stat{flex:1;text-align:center}
.target-stat .val{font-size:20px;font-weight:700}
.target-stat .lbl{font-size:11px;color:var(--ink-3)}
.plan-day-row{padding:10px var(--sp-4);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);cursor:pointer}
.plan-day-row:last-child{border-bottom:none}
.plan-day-name{font-size:13px;font-weight:600}
.plan-day-theme{font-size:12px;color:var(--ink-3)}
.plan-day-kcal{font-size:13px;font-weight:600;color:var(--accent)}

/* Workout */
.generate-form{background:var(--bg-elev);border-radius:var(--r-xl);border:1px solid var(--line);box-shadow:var(--shadow-sm);padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3)}
.form-row{display:flex;flex-direction:column;gap:var(--sp-1)}
.form-label{font-size:12px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.form-select{background:var(--bg-sunken);border:1px solid var(--line);border-radius:var(--r-md);padding:10px var(--sp-3);font-size:15px;color:var(--ink);appearance:none;-webkit-appearance:none;cursor:pointer;outline:none}
.form-select:focus{border-color:var(--accent);box-shadow:var(--shadow-focus)}
.segmented{display:flex;background:var(--bg-sunken);border-radius:var(--r-md);padding:3px;gap:2px}
.seg-btn{flex:1;padding:8px;font-size:13px;font-weight:500;border-radius:calc(var(--r-md) - 2px);text-align:center;cursor:pointer;transition:all .15s;color:var(--ink-3)}
.seg-btn.active{background:var(--bg-elev);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm)}
.workout-card{background:var(--bg-elev);border-radius:var(--r-xl);border:1px solid var(--line);box-shadow:var(--shadow-sm);overflow:hidden}
.workout-card-head{padding:var(--sp-3) var(--sp-4);display:flex;align-items:center;justify-content:space-between}
.workout-day{padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line)}
.workout-day-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:var(--sp-2);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.exercise-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed var(--line);gap:var(--sp-3)}
.exercise-row:last-child{border-bottom:none}
.exercise-name{font-size:14px;font-weight:500;flex:1}
.exercise-sets{font-size:13px;color:var(--ink-3);white-space:nowrap}

/* Snack swaps + rules + supplements */
.snack-swap-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--line)}
.snack-swap-row:last-child{border-bottom:none}
.snack-before{font-size:14px;color:var(--ink-3);text-decoration:line-through;flex:1}
.snack-arrow{color:var(--ink-4);font-size:14px}
.snack-after{font-size:14px;font-weight:600;flex:1.5}
.snack-kcal{font-size:12px;color:var(--ink-3);white-space:nowrap}
.rule-item{display:flex;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--line);align-items:flex-start}
.rule-item:last-child{border-bottom:none}
.rule-num{width:24px;height:24px;flex-shrink:0;border-radius:var(--r-full);background:var(--accent);color:var(--accent-ink);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rule-text{font-size:14px;line-height:1.5}
.supplement-row{display:flex;align-items:flex-start;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--line)}
.supplement-row:last-child{border-bottom:none}
.supp-icon{width:36px;height:36px;flex-shrink:0;border-radius:var(--r-md);background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:18px}
.supp-name{font-size:14px;font-weight:600}
.supp-detail{font-size:13px;color:var(--ink-3)}
.empty-state{text-align:center;padding:var(--sp-12) var(--sp-4);color:var(--ink-3)}
  </style>
</head>

  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="env,react">
// ═══════════════════════════════════════════════
// DATA — mirrors Prisma schema
// ═══════════════════════════════════════════════
const mockPlan = {
  id:'plan-1', targetKcal:2200, targetProtein:175, targetCarbs:220, targetFats:70,

      ]},
    { day:'Sunday', theme:'Mediterranean Sunday', totalKcal:2210, totalProtein:176, totalCarbs:222, totalFats:69,
      meals:[
        {type:'breakfast',name:'Greek Yogurt Parfait + Granola', kcal:420,protein:30,carbs:48,fats: 9},
        {type:'lunch',    name:'Grilled Halloumi Salad + Pitta', kcal:560,protein:32,carbs:55,fats:22},
        {type:'dinner',   name:'Lamb Koftas + Tzatziki + Bulgar',kcal:710,protein:52,carbs:62,fats:24},
        {type:'snack',    name:'Hummus + Carrots + Rice Cakes',  kcal:320,protein:10,carbs:46,fats:10},
        {type:'dessert',  name:'Frozen Yogurt + Honey + Walnuts',kcal:200,protein:12,carbs:22,fats: 8},
      ]},

// MACRO RING
// ═══════════════════════════════════════════════
const MacroRing = ({protein,carbs,fats,totalKcal,size=110}) => {
  const r=(size-16)/2, circ=Math.PI*2*r, gap=3;
  const pCal=protein*4, cCal=carbs*4, fCal=fats*9, tot=pCal+cCal+fCal||1;
  let off=0;
  const seg=(cal,color)=>{
    const pct=cal/tot, dash=Math.max(0,pct*circ-gap);
    const el=<circle key={color} cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={8}
      strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off} strokeLinecap="round"/>;
    off+=pct*circ; return el;
  };
  return (
    <div className="ring-wrapper" style={{width:size,height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--line)" strokeWidth={8}/>
        {seg(pCal,'var(--protein)')}{seg(cCal,'var(--carbs)')}{seg(fCal,'var(--fats)')}
      </svg>
      <div className="ring-center-text">
        <span style={{fontSize:20,fontWeight:700,lineHeight:1}}>{totalKcal.toLocaleString()}</span>
        <span style={{fontSize:11,color:'var(--ink-3)'}}>kcal</span>
      </div>
    </div>
  );
};

                <div className="msg-bubble msg-ai" style={{maxWidth:'100%',width:'100%',marginBottom:'var(--sp-2)'}}>
                  Here's your personalised plan — save it and you're good to go.
                </div>
                <div className="plan-result-card">
                  <div className="plan-result-header">
                    <div style={{fontFamily:'var(--font-serif)',fontSize:20,marginBottom:4}}>Your Fat Loss Plan</div>
                    <div style={{fontSize:13,opacity:.8}}>BMR {plan.bmr.toLocaleString()} · TDEE {plan.tdee.toLocaleString()} · −{plan.deficit} kcal deficit</div>
                  </div>
                  <div className="plan-result-targets">
                    {[{v:plan.targetKcal.toLocaleString(),l:'kcal'},{v:`${plan.targetProtein}g`,l:'protein'},{v:`${plan.targetCarbs}g`,l:'carbs'},{v:`${plan.targetFats}g`,l:'fats'}].map(t=>(
                      <div key={t.l} className="target-stat"><div className="val">{t.v}</div><div className="lbl">{t.l}</div></div>
                    ))}
                  </div>
                  <div>
                    <div style={{padding:'var(--sp-2) var(--sp-4)',fontSize:12,color:'var(--ink-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>7-Day Meal Plan</div>
                    {plan.days.map((d,i)=>(
                      <React.Fragment key={d.day}>
                        <div className="plan-day-row" onClick={()=>setExpDay(expDay===i?null:i)}>
                          <div>
                            <div className="plan-day-name">{d.day}</div>
                            <div className="plan-day-theme">{d.theme}</div>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
                            <span className="plan-day-kcal">{d.totalKcal} kcal</span>
                            <div style={{transform:expDay===i?'rotate(180deg)':'',transition:'transform .2s',color:'var(--ink-3)'}}>
                              <Icon name="chevron" size={16}/>
                            </div>
                          </div>
                        </div>
                        {expDay===i&&d.meals.length>0&&(
                          <div className="day-meals">
                            <div className="day-theme">{d.theme}</div>
                            {d.meals.map(m=>(
                              <div key={m.name} className="meal-row">
                                <span className="meal-type">{m.type}</span>
                                <span className="meal-name">{m.name}</span>
                                <span className="meal-kcal">{m.kcal}</span>
                              </div>
                            ))}
                            <div className="day-total">
                              <span style={{color:'var(--protein)'}}>P {d.totalProtein}g</span>
                              <span style={{color:'var(--carbs)'}}>C {d.totalCarbs}g</span>
                              <span style={{color:'var(--fats)'}}>F {d.totalFats}g</span>
                              <span style={{fontWeight:700}}>{d.totalKcal} kcal</span>
                            </div>
                          </div>
                        )}
                      </React.Fragment>
                    ))}
                  </div>
                  {sections.map(sec=>(
                    <React.Fragment key={sec.id}>
                      <div style={{padding:'10px var(--sp-4)',borderTop:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',background:'var(--bg)'}}
                           onClick={()=>setExpSec(expSec===sec.id?null:sec.id)}>
                        <span style={{fontSize:14,fontWeight:600}}>{sec.label}</span>
                        <div style={{transform:expSec===sec.id?'rotate(180deg)':'',transition:'transform .2s',color:'var(--ink-3)'}}>
                          <Icon name="chevron" size={16}/>
                        </div>
                      </div>
                      {expSec===sec.id&&sec.content}
                    </React.Fragment>
                  ))}
                  <div style={{padding:'var(--sp-4)'}}>
                    <button className="btn btn-primary btn-full btn-lg">
                      <Icon name="check" size={18}/> Save This Plan
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
        <div className="chat-input-area">
          <textarea className="chat-input" placeholder="Reply to coach..." rows={1}/>
          <button className="chat-send"><Icon name="send" size={16}/></button>
        </div>
      </div>
    </>
  );
};

// ═══════════════════════════════════════════════
// PAGE: PLANS
// ═══════════════════════════════════════════════
const PagePlans = () => {
  const [expPlan,setExpPlan]=React.useState(null);
  const [expDay,setExpDay]=React.useState(null);
  const [tab,setTab]=React.useState('all');
  const plans=[
    {id:'p1',label:'Jun 7–8 Weekend Plan',date:'Jun 7, 2026',kcal:2200,p:175,c:220,f:70,data:mockPlan},
    {id:'p2',label:'May 31–Jun 1 Weekend', date:'May 31, 2026',kcal:2200,p:175,c:220,f:70,data:mockPlan},
    {id:'p3',label:'May 24–25 Weekend',    date:'May 24, 2026',kcal:2200,p:172,c:218,f:72,data:mockPlan},
  ];
  return (
    <div className="page-inner">
      <h1 className="t-title">My Plans</h1>
      <div className="segmented">
        {['all','nutrition','workout'].map(t=>(
          <button key={t} className={`seg-btn${tab===t?' active':''}`} onClick={()=>setTab(t)} style={{textTransform:'capitalize'}}>{t}</button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--sp-3)'}}>
        {plans.map(p=>(
          <div key={p.id} className="plan-item">
            <div className="plan-item-head" onClick={()=>setExpPlan(expPlan===p.id?null:p.id)}>
              <div>
                <div style={{fontWeight:600,fontSize:15}}>{p.label}</div>
                <div style={{display:'flex',alignItems:'center',gap:'var(--sp-2)',marginTop:3}}>
                  <span style={{fontSize:12,color:'var(--ink-3)'}}>{p.date}</span>
                  <span className="chip chip-accent">{p.kcal.toLocaleString()} kcal</span>
                </div>
                <div style={{display:'flex',gap:'var(--sp-3)',marginTop:'var(--sp-2)'}}>
                  {[{l:'P',v:`${p.p}g`,c:'var(--protein)'},{l:'C',v:`${p.c}g`,c:'var(--carbs)'},{l:'F',v:`${p.f}g`,c:'var(--fats)'}].map(m=>(
                    <span key={m.l} style={{fontSize:12,fontWeight:700,color:m.c}}>{m.l} {m.v}</span>
                  ))}
                </div>
              </div>
              <div className={`plan-expand${expPlan===p.id?' open':''}`}><Icon name="chevron" size={18}/></div>
            </div>
            {expPlan===p.id&&p.data.days.map((d,i)=>{
              const k=`${p.id}-${i}`, open=expDay===k;
              return (
                <div key={d.day} className="day-meals">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setExpDay(open?null:k)}>
                    <div className="day-theme">{d.day} · {d.theme}</div>
                    <div style={{color:'var(--ink-3)',transform:open?'rotate(180deg)':'',transition:'transform .2s'}}><Icon name="chevron" size={14}/></div>
                  </div>
                  {open&&d.meals.length>0&&(
                    <>
                      {d.meals.map(m=>(
                        <div key={m.name} className="meal-row">
                          <span className="meal-type">{m.type}</span>
                          <span className="meal-name">{m.name}</span>
                          <span className="meal-kcal">{m.kcal} kcal</span>
                        </div>
                      ))}
                      <div className="day-total">
                        <span style={{color:'var(--protein)'}}>P {d.totalProtein}g</span>
                        <span style={{color:'var(--carbs)'}}>C {d.totalCarbs}g</span>
                        <span style={{color:'var(--fats)'}}>F {d.totalFats}g</span>
                        <span style={{fontWeight:700}}>{d.totalKcal} kcal</span>
                      </div>
                    </>
                  )}
                  {open&&d.meals.length===0&&<div style={{fontSize:13,color:'var(--ink-3)',paddingTop:4,fontStyle:'italic'}}>Meals shown for Sat/Sun only in this prototype.</div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// PAGE: WORKOUTS
// ═══════════════════════════════════════════════
const PageWorkouts = () => {
  const [goal,setGoal]=React.useState('fat-loss');
  const [days,setDays]=React.useState('4');
  const [equip,setEquip]=React.useState('full-gym');
  const [expanded,setExpanded]=React.useState(true);
  const [expDay,setExpDay]=React.useState('0');
  const w=mockWorkout;
  return (
    <div className="page-inner">
      <h1 className="t-title">Workouts</h1>
      <div>
        <div className="section-head"><span className="section-label">Generate New Plan</span></div>
        <div className="generate-form">
          <div className="form-row">
            <label className="form-label">Goal</label>
            <div className="segmented">
              {[{v:'fat-loss',l:'Fat Loss'},{v:'muscle',l:'Build Muscle'},{v:'maintain',l:'Maintain'}].map(o=>(
                <button key={o.v} className={`seg-btn${goal===o.v?' active':''}`} onClick={()=>setGoal(o.v)}>{o.l}</button>
              ))}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'var(--sp-3)'}}>
            <div className="form-row">
              <label className="form-label">Days / week</label>
              <select className="form-select" value={days} onChange={e=>setDays(e.target.value)}>
                {[2,3,4,5,6].map(n=><option key={n} value={n}>{n} days</option>)}
              </select>
            </div>
            <div className="form-row">
              <label className="form-label">Equipment</label>
              <select className="form-select" value={equip} onChange={e=>setEquip(e.target.value)}>
                <option value="full-gym">Full gym</option>
                <option value="home-basic">Home / basic</option>
                <option value="bodyweight">Bodyweight only</option>
              </select>
            </div>
          </div>
          <button className="btn btn-energy btn-full">
            <Icon name="bolt" size={16}/> Generate Workout Plan
          </button>
        </div>
      </div>
      <div>
        <div className="section-head"><span className="section-label">Saved Workouts</span></div>
        <div className="workout-card">
          <div className="workout-card-head">
            <div>
              <div style={{fontWeight:600,fontSize:15}}>{w.label}</div>
              <div style={{fontSize:13,color:'var(--ink-3)'}}>{w.daysPerWeek} days/week · Fat loss · Full gym</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'var(--sp-2)'}}>
              <span className="chip chip-success">Active</span>
              <div style={{color:'var(--ink-3)',transform:expanded?'rotate(180deg)':'',transition:'transform .2s',cursor:'pointer'}} onClick={()=>setExpanded(e=>!e)}>
                <Icon name="chevron" size={18}/>
              </div>
            </div>
          </div>
          {expanded&&w.days.map((d,i)=>{
            const open=expDay===String(i);
            return (
              <div key={i} className="workout-day">
                <div className="workout-day-label" onClick={()=>setExpDay(open?null:String(i))}>
                  <span>{d.label}</span>
                  <span style={{fontSize:11,color:'var(--ink-3)',fontWeight:400,textTransform:'none',letterSpacing:0}}>{d.focus}</span>
                </div>
                {open&&d.exercises.map(e=>(
                  <div key={e.name} className="exercise-row">
                    <span className="exercise-name">{e.name}</span>
                    <span className="exercise-sets">{e.sets}×{e.reps}{e.notes&&<span style={{color:'var(--ink-4)',fontSize:11}}> · {e.notes}</span>}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════
const TITLES={home:'Forma',coach:'AI Coach',plans:'My Plans',workouts:'Workouts'};
const PAGES={home:PageHome,coach:PageCoach,plans:PagePlans,workouts:PageWorkouts};

const App = () => {
  const [page,setPage]=React.useState('home');
  const [dark,setDark]=React.useState(false);
  React.useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'light');},[dark]);
  const Page=PAGES[page];
  return (
    <div className="app-shell">
      <TopNav title={TITLES[page]} dark={dark} toggleDark={()=>setDark(d=>!d)}/>
      <main className="page-content"><Page setPage={setPage}/></main>
      <TabBar active={page} setPage={setPage}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
